<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup">
    <div class="header">
      <div class="header-copy">
        <h1>Ads Art</h1>
        <p class="tagline">Turn ads into art pieces</p>
      </div>

      <label class="power-toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="power-toggle-ui"></span>
      </label>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="count">0</span>
        <span class="stat-label">replaced today</span>
      </div>
    </div>


    <div class="setting-row">
      <div class="collection-toggle" role="group" aria-label="collection">
        <button class="collection-button" type="button" data-category="all">All</button>
        <button class="collection-button" type="button" data-category="art">Art</button>
        <button class="collection-button" type="button" data-category="nasa">NASA</button>
      </div>
    </div>

    <div class="footer">
      <p>Art Institute of Chicago · The MET · NASA</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
